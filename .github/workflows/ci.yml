name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test & Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: eaos
          POSTGRES_USER: eaos
          POSTGRES_PASSWORD: eaos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv & Python 3.14
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Run Linter & Type Check
        run: uv run task lint

      - name: Run AST Architecture Validation
        run: uv run task validate

      - name: Execute Pytest Suite with Coverage
        env:
          DATABASE_URL: postgresql://eaos:eaos@localhost:5432/eaos
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest --cov=packages --cov=kernel --cov-report=xml --cov-report=term-missing tests/

      - name: Upload Test Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
