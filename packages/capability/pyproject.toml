[project]
name = "eaos-capability"
version = "0.1.0"
description = "EAOS Capability Runtime Package"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]