name: Quality Gates & Fitness Functions

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  quality-gate:
    name: Code Quality, Tests & Architecture Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv & Python 3.14
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.14"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --all-groups

      - name: Run Ruff Lint Check
        run: uv run task lint

      - name: Run Full Test Suite Gate
        run: uv run task test

      - name: Run Architecture Validator Gate
        run: uv run task validate