[project]
name = "eaos-evolution"
version = "0.1.0"
description = "EAOS Evolution Domain Package"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.13.4"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]