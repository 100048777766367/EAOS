[project]
name = "eaos-identity"
version = "0.1.0"
description = "EAOS Identity Domain Package"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.13.4",
    "sqlalchemy>=2.0.0",
    "email-validator>=2.1.0",
    "bcrypt>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]
