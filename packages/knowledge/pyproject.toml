[project]
name = "eaos-knowledge"
version = "0.1.0"
description = "EAOS Knowledge Domain Package"
requires-python = ">=3.14"
dependencies = [
    "psycopg2-binary>=2.9.12",
    "pydantic>=2.13.4",
    "sqlalchemy>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]
