[project]
name = "eaos-memory"
version = "0.1.0"
description = "EAOS Enterprise Memory Package"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.13.4"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]