version: '3.8'

services:
  eaos-postgres:
    image: pgvector/pgvector:0.5.1-pg16 # PostgreSQL 16 tích hợp sẵn pgvector cho tìm kiếm ngữ nghĩa
    container_name: eaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eaos_pass}
      POSTGRES_DB: ${POSTGRES_DB:-eaos_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${DOCKER_DATA_PATH:-./infra/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eaos} -d ${POSTGRES_DB:-eaos_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  eaos-redis:
    image: redis:7.2-alpine
    container_name: eaos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DOCKER_DATA_PATH:-./infra/data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  eaos-minio:
    image: minio/minio:RELEASE.2024-01-28T22-40-52Z
    container_name: eaos-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-eaos_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-eaos_admin_pass}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${DOCKER_DATA_PATH:-./infra/data}/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5