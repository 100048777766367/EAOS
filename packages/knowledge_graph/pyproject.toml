[project]
name = "eaos-knowledge-graph"
version = "0.1.0"
description = "EAOS Knowledge Graph Bounded Context"
requires-python = ">=3.14"
dependencies = ["pydantic>=2.6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]
