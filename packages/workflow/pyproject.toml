[project]
name = "eaos-workflow"
version = "0.1.0"
description = "EAOS Workflow Runtime Package"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.6.0",
    "pyyaml>=6.0.1"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["domain", "application", "infrastructure"]
