id: workflow.invoice_approval
name: Invoice Autonomous Approval Lifecycle
initial_state: drafted
states:
  - name: drafted
    transitions:
      - trigger: submit
        target: validating
  - name: validating
    transitions:
      - trigger: approve
        target: approved
      - trigger: reject
        target: rejected
  - name: approved
    transitions: []
  - name: rejected
    transitions: []
