# ==============================================================================
# EAOS PLATFORM GIT COMMIT GOVERNANCE QUALITY GATES
# ==============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        exclude: ^generated/
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-toml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # TÍCH HỢP TỐI CAO: Ép buộc chạy Linter Kiến trúc tự xây dựng của chính EAOS ngay khi commit!
  - repo: local
    hooks:
      - id: eaos-architecture-validator
        name: EAOS Architecture Validator (Hiến pháp tối cao)
        entry: uv run taskipy validate
        language: system
        pass_filenames: false
        always_run: true