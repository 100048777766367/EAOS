id: spec.invoice
name: Invoice Verification Schema
rules:
  - id: RULE-001
    expression: payload.id.startswith('INV-')
    error_message: Mã hóa hóa đơn bắt buộc phải bắt đầu bằng INV-
  - id: RULE-002
    expression: payload.amount > 0
    error_message: Tổng tiền hóa đơn bắt buộc phải lớn hơn 0
